<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KemblincK</title>
  <meta name="description" content="KemblincK - More coming soon">
  <link rel="canonical" href="https://kemblinck.nl/">
  <script>if(location.hostname==='kemblinck.com'||location.hostname==='www.kemblinck.com')location.replace('https://kemblinck.nl'+location.pathname);</script>
  <link rel="icon" type="image/png" href="logo-transparent.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Subtle background watermark pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url('logo-transparent.png');
      background-repeat: repeat;
      background-size: 200px 200px;
      opacity: 0.02;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      top: -200px;
      right: -100px;
      background: #1B5E20;
    }
    .glow-2 {
      bottom: -200px;
      left: -100px;
      background: #E8A020;
    }

    .container {
      text-align: center;
      z-index: 1;
      position: relative;
      padding: 2rem;
    }

    .logo {
      width: min(400px, 70vw);
      height: auto;
      margin-bottom: 3rem;
      animation: fadeIn 2s ease-out;
      filter: drop-shadow(0 0 60px rgba(232, 160, 32, 0.15));
    }

    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #E8A020, transparent);
      margin: 0 auto 2rem;
      animation: fadeIn 2s ease-out 0.5s both;
    }

    .tagline {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      animation: fadeIn 2s ease-out 0.8s both;
    }

    .contact {
      margin-top: 3rem;
      animation: fadeIn 2s ease-out 1.2s both;
    }
    .contact a {
      color: #E8A020;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      transition: color 0.3s;
    }
    .contact a:hover {
      color: #fff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="container">
    <img src="logo-main-2x.png" alt="KemblincK" class="logo">
    <div class="divider"></div>
    <p class="tagline">More coming soon</p>
    <div class="contact">
      <a href="mailto:info@kemblinck.nl">info@kemblinck.nl</a>
    </div>
  </div>
</body>
</html>
